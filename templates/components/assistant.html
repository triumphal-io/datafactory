{% load static %}
<script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/showdown/2.1.0/showdown.min.js"
        integrity="sha512-LhccdVNGe2QMEfI3x4DVV3ckMRe36TfydKss6mJpdHjNFiV07dFpS2xzeZedptKZrwxfICJpez09iNioiSZ3hA=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<div class="assistant">
    <div class="assistant-head"></div>
    <div class="assistant-body scroll-y thin-scroll">
        <div class="spacer"></div>

        <div class="message message-user text--micro">
            <p>User message</p>
        </div>

        <div class="message message-assistant text--micro">
            <p>
                Lorem ipsum dolor sit amet, consectetur adipiscing elit.
                <br />
                Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
            </p>
        </div>
    </div>
    <div class="assistant-footer">
        <div class="assistant-input-pad">
            <textarea class="input-empty flex-expanded" 
                id="assistant-input" onkeydown="if (event.ctrlKey && event.key === 'Enter') { event.preventDefault(); sendMessage(); }"
                rows="3" placeholder="Type your message..."></textarea>
                {% csrf_token %}
            <div class="flex flex-row-center flex-space-between">
                <i class="icon-ic_fluent_add_48_regular i-normal"></i>
                <i class="icon-ic_fluent_send_48_regular i-normal" onclick="sendMessage()"></i>
            </div>
        </div>
    </div>
</div>


<script>

    function sendMessage() {
        const input = document.getElementById("assistant-input");
        const message = input.value.trim();
        if (message) {
            // Send the message to the server or process it
            console.log("Sending message:", message);
            input.value = ""; // Clear the input
            $(".assistant-body").append(`
                <div class="message message-user text--micro">
                    <p>${message}</p>
                </div>
            `);
            autoScroll();
        }

        var payload = {
            message: message,
            csrfmiddlewaretoken: '{{ csrf_token }}'
        };

        $.post("/api/assistant/ask", payload, function(response) {
            console.log("Server response:", response);
            if (response.status === 'success') {
                // Display the assistant's response
                const assistantMessage = response.message;
                const messageContainer = document.createElement("div");
                messageContainer.classList.add("message", "message-assistant", "text--micro");
                messageContainer.innerHTML = `<p>${convertMarkdownToHtml(assistantMessage)}</p>`;
                document.querySelector(".assistant-body").appendChild(messageContainer);
                autoScroll();
            }
        });
    }

    function autoScroll() {
        const body = document.querySelector('.assistant-body');
        if (!body) return;
        // briefly yield so layout updates first, then scroll to bottom
        requestAnimationFrame(() => {
            body.scrollTop = body.scrollHeight;
        });
    }

    function convertMarkdownToHtml(text) {
        showdown.setFlavor('github');
        showdown.extension('targetlink', function () {
            return [{
                type: 'html',
                regex: /(<a [^>]+?)(>.*<\/a>)/g,
                replace: '$1 target="_blank"$2'
            }];
        });
        var converter = new showdown.Converter({
            extensions: ['targetlink']
        });
        return converter.makeHtml(text);
    }

</script>
