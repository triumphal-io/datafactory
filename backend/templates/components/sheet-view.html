{% load static %}

<!-- Main Sheet Container -->
<div class="sheet flex flex-column">
    
    <!-- Sheet Navigation Bar -->
    <div class="sheet-nav flex flex-row-center flex-space-between">
        <!-- Sheet Title Section -->
        <div class="flex flex-row-center gap-15 pad-14 padr-15 padl-15">
            <i class="icon-ic_fluent_chevron_left_48_regular i-normal-plus"></i>
            <p>Sheet Name here</p>
        </div>
        
        <!-- Navigation Menu Items -->
        <div class="flex flex-row-center">
            <div onclick="enrichSelectedCells()" class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10">
                <img src="{% static 'assets/star.svg' %}" alt="Star Icon" />
                <p class="text--micro" id="enrich-text">Enrich</p>
            </div>
            
            <div onclick="deleteSelectedRows()" id="delete-row-btn" class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10" style="display: none;">
                <i class="icon-ic_fluent_delete_28_regular i-normal"></i>
                <p class="text--micro">Delete Row</p>
            </div>
            <div onclick="deleteSelectedColumns()" id="delete-column-btn" class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10" style="display: none;">
                <i class="icon-ic_fluent_delete_28_regular i-normal"></i>
                <p class="text--micro">Delete Column</p>
            </div>
            
            <div onclick="addRow()" class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10">
                <i class="icon-ic_fluent_add_circle_28_regular i-normal"></i>
                <p class="text--micro">Add Row</p>
            </div>
            
            <div onclick="openPopup('column')" class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10">
                <i class="icon-ic_fluent_add_circle_28_regular i-normal"></i>
                <p class="text--micro">Add Column</p>
            </div>
            
            <div class="sheet-nav-menu-item pad-14 pointer flex flex-row-center gap-10">
                <i class="icon-ic_fluent_arrow_export_ltr_20_regular i-normal"></i>
                <p class="text--micro">Export</p>
            </div>
        </div>
    </div>
    
    <!-- Sheet Content Area -->
    <div class="sheet-content flex-expanded scroll-x scroll-y thin-scroll">
        <div class="sheet-grid-container">
            
            <!-- Header Row -->
            <div class="sheet-row header-row">
                <div class="sheet-row-head">
                    <input onchange="select_row(this.id, 'all')" 
                           type="checkbox" 
                           class="cbx" 
                           id="cbxbnall" 
                           style="display: none">
                    <label for="cbxbnall" class="check">
                        {% include 'components/atoms/checkbox.html' %}
                    </label>
                </div>
                <div class="sheet-row-item header-cell" data-col="0" data-description="Name of the Product">Product Name</div>
                <div class="sheet-row-item header-cell" data-col="1" data-description="Category of the Product">Product Category</div>
                <div class="sheet-row-item header-cell" data-col="2" data-description="Price of the Product">Product Price</div>
            </div>
            
            <!-- Data Rows -->
            <div class="sheet-row">
                <div class="sheet-row-head" data-row="1">
                    <span class="row-number">1</span>
                    <input onchange="select_row(this.id, '1')" 
                           type="checkbox" 
                           class="cbx row-checkbox" 
                           id="cbxbn1" 
                           style="display: none">
                    <label for="cbxbn1" class="check row-check">
                        {% include 'components/atoms/checkbox.html' %}
                    </label>
                </div>
                <div class="sheet-row-item" contenteditable="false">Zendesk</div>
                <div class="sheet-row-item" contenteditable="false"></div>
                <div class="sheet-row-item" contenteditable="false"></div>
            </div>
            
            <div class="sheet-row">
                <div class="sheet-row-head" data-row="2">
                    <span class="row-number">2</span>
                    <input onchange="select_row(this.id, '2')" 
                           type="checkbox" 
                           class="cbx row-checkbox" 
                           id="cbxbn2" 
                           style="display: none">
                    <label for="cbxbn2" class="check row-check">
                        {% include 'components/atoms/checkbox.html' %}
                    </label>
                </div>
                <div class="sheet-row-item" contenteditable="false">Trello</div>
                <div class="sheet-row-item" contenteditable="false"></div>
                <div class="sheet-row-item" contenteditable="false"></div>
            </div>
            
            <div class="sheet-row">
                <div class="sheet-row-head" data-row="3">
                    <span class="row-number">3</span>
                    <input onchange="select_row(this.id, '3')" 
                           type="checkbox" 
                           class="cbx row-checkbox" 
                           id="cbxbn3" 
                           style="display: none">
                    <label for="cbxbn3" class="check row-check">
                        {% include 'components/atoms/checkbox.html' %}
                    </label>
                </div>
                <div class="sheet-row-item" contenteditable="false">Asana</div>
                <div class="sheet-row-item" contenteditable="false"></div>
                <div class="sheet-row-item" contenteditable="false"></div>
            </div>
            
            <div class="sheet-row">
                <div class="sheet-row-head" data-row="4">
                    <span class="row-number">4</span>
                    <input onchange="select_row(this.id, '4')" 
                           type="checkbox" 
                           class="cbx row-checkbox" 
                           id="cbxbn4" 
                           style="display: none">
                    <label for="cbxbn4" class="check row-check">
                        {% include 'components/atoms/checkbox.html' %}
                    </label>
                </div>
                <div class="sheet-row-item" contenteditable="false">Canva</div>
                <div class="sheet-row-item" contenteditable="false"></div>
                <div class="sheet-row-item" contenteditable="false"></div>
            </div>
            
        </div>
    </div>
</div>


<!-- Column/Row Add/Edit Popup -->
<div id="popup" class="popup">
    <div class="popup-content">
        <div class="pop-add-column flex flex-column">
            
            <!-- Popup Header -->
            <div class="flex flex-row-center flex-space-between">
                <p class="text--mega-plus" id="popup-title">Add Column</p>
                <i class="icon-ic_fluent_dismiss_48_regular text--black i-normal-plus pointer" 
                   onclick="closePopup()"></i>
            </div>
            
            <!-- Column Title Input -->
            <p class="text--micro mrgnt-15">Column Title</p>
            <input type="text" 
                   id="column-title" 
                   class="form--input wdth-full mrgnt-7" 
                   placeholder="Enter column title" />

            <!-- Column Prompt Input -->
            <p class="text--micro mrgnt-15">Column Prompt (generated)</p>
            <textarea id="column-prompt" 
                      class="form--input wdth-full mrgnt-7 text--black" 
                      placeholder="Datafactory will generate a prompt based on the column title"></textarea>
            
            <!-- Action Button -->
            <button onclick="addColumn()" 
                    class="button button-big button-dark wdth-full mrgnt-20" 
                    id="column-action-btn">Add Column</button>
        </div>
    </div>
</div>

<script>
    // ===========================
    // GLOBAL VARIABLES
    // ===========================
    let selectedCells = new Set();
    let selectedRows = new Set();
    let selectedColumns = new Set();
    let isDragging = false;
    let dragStartCell = null;
    let currentEditingCell = null;
    let isSelectionMode = false;
    let lastClickedCell = null; // Track the last clicked cell for paste operations

    // Add CSS for status indicators
    if (!document.getElementById('enrichment-styles')) {
        const style = document.createElement('style');
        style.id = 'enrichment-styles';
        style.textContent = `
            .enrichment-status {
                pointer-events: none;
                user-select: none;
            }
        `;
        document.head.appendChild(style);
    }

    // ===========================
    // INITIALIZATION
    // ===========================
    
    /**
     * Initialize event listeners when document is ready
     */
    document.addEventListener('DOMContentLoaded', function() {
        initializeSheetCells();
        initializeHeaderCells();
        updateEnrichText();
    });

    // ===========================
    // HEADER CELL HANDLERS
    // ===========================
    
    /**
     * Initialize header cell event handlers
     */
    function initializeHeaderCells() {
        const headerCells = document.querySelectorAll('.header-cell');
        
        headerCells.forEach((headerCell, index) => {
            let clickTimer = null;
            
            // Handle single click - select entire column
            headerCell.addEventListener('click', function(e) {
                e.preventDefault();
                
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                    return; // This is a double-click, so don't proceed with single-click logic
                }
                
                clickTimer = setTimeout(() => {
                    const colIndex = this.getAttribute('data-col');
                    if (colIndex !== null) {
                        selectColumn(parseInt(colIndex));
                    }
                    clickTimer = null;
                }, 200); // 200ms delay to distinguish from double-click
            });
            
            // Handle double click - open popup for column editing
            headerCell.addEventListener('dblclick', function(e) {
                e.preventDefault();
                
                if (clickTimer) {
                    clearTimeout(clickTimer);
                    clickTimer = null;
                }
                
                openColumnPopup(this);
            });
        });
    }

    // ===========================
    // SHEET CELL HANDLERS
    // ===========================
    
    /**
     * Initialize sheet cell event handlers and data attributes
     */
    function initializeSheetCells() {
        const cells = document.querySelectorAll('.sheet-row-item:not(.header-cell)');
        const rows = document.querySelectorAll('.sheet-row:not(.header-row)');
        
        // Calculate row and column positions for each cell
        let cellIndex = 0;
        
        rows.forEach((row, rowIndex) => {
            const rowCells = row.querySelectorAll('.sheet-row-item:not(.header-cell)');
            rowCells.forEach((cell, colIndex) => {
                // Add data attributes for easier selection
                cell.setAttribute('data-cell-id', cellIndex);
                cell.setAttribute('data-row', rowIndex);
                cell.setAttribute('data-col', colIndex);
                cellIndex++;
                
                setupCellEventHandlers(cell);
            });
        });
        
        setupGlobalEventHandlers();
    }

    /**
     * Setup event handlers for individual cells
     */
    function setupCellEventHandlers(cell) {
        // Handle mousedown for drag selection start
        cell.addEventListener('mousedown', function(e) {
            if (currentEditingCell) return;
            
            e.preventDefault();
            
            // Track the last clicked cell for paste operations
            lastClickedCell = this;
            
            // Toggle individual cell selection with Ctrl
            if (e.ctrlKey) {
                toggleCellSelection(this);
                return;
            }
            
            // Clear previous selections when starting new selection without Ctrl
            clearSelection();
            
            // Start drag selection
            isDragging = true;
            dragStartCell = this;
            
            selectCell(this);
            isSelectionMode = true;
        });
        
        // Handle mouseover for drag selection
        cell.addEventListener('mouseenter', function(e) {
            if (isDragging && dragStartCell) {
                selectCellRange(dragStartCell, this);
            }
        });
        
        // Handle click events
        cell.addEventListener('click', function(e) {
            if (isSelectionMode) {
                e.preventDefault();
                return;
            }
            
            // Track the last clicked cell for paste operations
            lastClickedCell = this;
            
            if (!e.ctrlKey && selectedCells.size === 0) {
                this.focus();
            }
        });

        // Handle double click to enter edit mode
        cell.addEventListener('dblclick', function(e) {
            e.preventDefault();
            clearSelection();
            this.contentEditable = 'true';
            currentEditingCell = this;
            this.focus();
            
            // Place cursor at the end of text
            const range = document.createRange();
            const selection = window.getSelection();
            range.selectNodeContents(this);
            range.collapse(false);
            selection.removeAllRanges();
            selection.addRange(range);
        });

        // Handle blur (when cell loses focus)
        cell.addEventListener('blur', function(e) {
            this.contentEditable = 'false';
            if (currentEditingCell === this) {
                currentEditingCell = null;
            }
        });

        // Handle Enter and Escape keys
        cell.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                this.blur();
            } else if (e.key === 'Escape') {
                e.preventDefault();
                this.blur();
            }
        });
    }

    /**
     * Setup global event handlers
     */
    function setupGlobalEventHandlers() {
        // Global mouseup to end drag selection
        document.addEventListener('mouseup', function(e) {
            if (isDragging) {
                isDragging = false;
                dragStartCell = null;
                setTimeout(() => {
                    isSelectionMode = false;
                }, 10);
            }
        });
        
        // Handle Escape key to clear selection
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !currentEditingCell) {
                clearSelection();
            }
        });
        
        // Handle global paste events
        document.addEventListener('paste', function(e) {
            // Only handle paste if we're not in edit mode and have a target cell
            if (!currentEditingCell && lastClickedCell) {
                e.preventDefault();
                
                // Get the pasted text
                const pastedText = (e.clipboardData || window.clipboardData).getData('text');
                
                if (pastedText.trim()) {
                    handleMultiLinePaste(lastClickedCell, pastedText);
                }
            }
        });
        
        // Handle clicking on empty space to clear selection
        const sheetContent = document.querySelector('.sheet-content');
        if (sheetContent) {
            sheetContent.addEventListener('click', function(e) {
                if (e.target === this || 
                    e.target.classList.contains('sheet-grid-container') ||
                    (e.target.closest('.sheet-row') && 
                     !e.target.closest('.sheet-row-item') && 
                     !e.target.closest('.sheet-row-head'))) {
                    
                    if (!isDragging && !isSelectionMode) {
                        clearSelection();
                    }
                }
            });
        }
    }

    // ===========================
    // PASTE HANDLING FUNCTIONS
    // ===========================
    
    /**
     * Handle multi-line paste operations
     */
    function handleMultiLinePaste(startCell, pastedText) {
        // Split the pasted text by line breaks
        const lines = pastedText.split(/\r?\n/).filter(line => line.trim() !== '');
        
        if (lines.length === 0) return;
        
        const startRow = parseInt(startCell.getAttribute('data-row'));
        const startCol = parseInt(startCell.getAttribute('data-col'));
        
        // Clear any existing selection
        clearSelection();
        
        // Process each line
        lines.forEach((line, rowOffset) => {
            // Split each line by tabs to handle multiple columns
            const columns = line.split('\t');
            
            columns.forEach((cellValue, colOffset) => {
                const targetRowIndex = startRow + rowOffset;
                const targetColIndex = startCol + colOffset;
                let targetCell = findCell(targetRowIndex, targetColIndex);
                
                // If no cell exists at this row, create a new row
                if (!targetCell && colOffset === 0) {
                    createNewRow(targetRowIndex);
                }
                
                // Try to find the cell again after potential row creation
                targetCell = findCell(targetRowIndex, targetColIndex);
                
                // If we still don't have a cell, check if we need to create a new column
                if (!targetCell) {
                    const currentColumnCount = document.querySelectorAll('.header-cell').length;
                    
                    // If we need more columns, create them
                    if (targetColIndex >= currentColumnCount) {
                        const columnsNeeded = targetColIndex - currentColumnCount + 1;
                        for (let i = 0; i < columnsNeeded; i++) {
                            createNewColumn(`Column ${currentColumnCount + i + 1}`, `Auto-generated column ${currentColumnCount + i + 1}`);
                        }
                        
                        // Re-initialize after adding columns
                        setTimeout(() => {
                            initializeSheetCells();
                            initializeHeaderCells();
                        }, 10);
                        
                        // Try to find the cell again
                        targetCell = findCell(targetRowIndex, targetColIndex);
                    }
                }
                
                if (targetCell) {
                    // Set the cell content
                    targetCell.textContent = cellValue.trim();
                    // Select the cell to show what was pasted
                    selectCell(targetCell);
                }
            });
        });
        
        console.log(`Pasted ${lines.length} rows with multi-column data starting from row ${startRow + 1}, column ${startCol + 1}`);
    }
    
    /**
     * Find a cell by row and column indices
     */
    function findCell(rowIndex, colIndex) {
        return document.querySelector(`[data-row="${rowIndex}"][data-col="${colIndex}"]`);
    }
    
    /**
     * Create a new row at the specified index
     */
    function createNewRow(rowIndex) {
        const sheetContainer = document.querySelector('.sheet-grid-container');
        const headerCells = document.querySelectorAll('.header-cell');
        const numColumns = headerCells.length;
        
        // Create new row element
        const newRow = document.createElement('div');
        newRow.className = 'sheet-row';
        
        // Create row header with checkbox
        const rowHead = document.createElement('div');
        rowHead.className = 'sheet-row-head';
        rowHead.setAttribute('data-row', rowIndex);
        
        // Row number
        const rowNumber = document.createElement('span');
        rowNumber.className = 'row-number';
        rowNumber.textContent = rowIndex + 1;
        
        // Checkbox
        const checkboxId = `cbxbn${rowIndex + 1}`;
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'cbx row-checkbox';
        checkbox.id = checkboxId;
        checkbox.style.display = 'none';
        checkbox.setAttribute('onchange', `select_row('${checkboxId}', '${rowIndex + 1}')`);
        
        const label = document.createElement('label');
        label.className = 'check row-check';
        label.setAttribute('for', checkboxId);
        label.innerHTML = `<svg width="16px" height="16px" viewBox="0 0 18 18">
            <path d="M1,9 L1,3.5 C1,2 2,1 3.5,1 L14.5,1 C16,1 17,2 17,3.5 L17,14.5 C17,16 16,17 14.5,17 L3.5,17 C2,17 1,16 1,14.5 L1,9 Z"></path>
            <polyline points="1 9 7 14 15 4"></polyline>
        </svg>`;
        
        rowHead.appendChild(rowNumber);
        rowHead.appendChild(checkbox);
        rowHead.appendChild(label);
        newRow.appendChild(rowHead);
        
        // Create cells for each column
        for (let colIndex = 0; colIndex < numColumns; colIndex++) {
            const newCell = document.createElement('div');
            newCell.className = 'sheet-row-item';
            newCell.setAttribute('contenteditable', 'false');
            newCell.setAttribute('data-row', rowIndex);
            newCell.setAttribute('data-col', colIndex);
            newCell.textContent = ''; // Empty cell
            
            // Setup event handlers for the new cell
            setupCellEventHandlers(newCell);
            
            newRow.appendChild(newCell);
        }
        
        // Insert the row in the correct position
        const existingRows = sheetContainer.querySelectorAll('.sheet-row:not(.header-row)');
        if (rowIndex < existingRows.length) {
            // Insert before existing row
            sheetContainer.insertBefore(newRow, existingRows[rowIndex]);
        } else {
            // Append to end
            sheetContainer.appendChild(newRow);
        }
        
        // Update row indices for all subsequent rows
        updateRowIndices();
        
        console.log(`Created new row at index ${rowIndex}`);
    }
    
    /**
     * Update row indices and data attributes for all rows
     */
    function updateRowIndices() {
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        
        dataRows.forEach((row, index) => {
            // Update row head
            const rowHead = row.querySelector('.sheet-row-head');
            if (rowHead) {
                rowHead.setAttribute('data-row', index);
                
                // Update row number
                const rowNumber = rowHead.querySelector('.row-number');
                if (rowNumber) {
                    rowNumber.textContent = index + 1;
                }
                
                // Update checkbox
                const checkbox = rowHead.querySelector('.row-checkbox');
                const label = rowHead.querySelector('.check');
                if (checkbox && label) {
                    const newId = `cbxbn${index + 1}`;
                    checkbox.id = newId;
                    checkbox.setAttribute('onchange', `select_row('${newId}', '${index + 1}')`);
                    label.setAttribute('for', newId);
                }
            }
            
            // Update all cells in this row
            const cells = row.querySelectorAll('.sheet-row-item:not(.header-cell)');
            cells.forEach((cell, colIndex) => {
                cell.setAttribute('data-row', index);
                cell.setAttribute('data-col', colIndex);
                cell.setAttribute('data-cell-id', index * cells.length + colIndex);
            });
        });
    }

    // ===========================
    // CELL SELECTION FUNCTIONS
    // ===========================
    
    /**
     * Select a single cell
     */
    function selectCell(cell) {
        cell.classList.add('selected');
        selectedCells.add(cell);
        updateEnrichText();
        updateDeleteButtonVisibility();
        
        // Check if this cell selection affects any row checkbox states
        updateRowCheckboxStates();
    }

    /**
     * Deselect a single cell
     */
    function deselectCell(cell) {
        cell.classList.remove('selected');
        selectedCells.delete(cell);
        updateEnrichText();
        updateDeleteButtonVisibility();
        
        // Check if this cell deselection affects any row checkbox states
        updateRowCheckboxStates();
    }

    /**
     * Toggle cell selection state
     */
    function toggleCellSelection(cell) {
        if (selectedCells.has(cell)) {
            deselectCell(cell);
        } else {
            selectCell(cell);
        }
    }

    /**
     * Clear all cell selections
     */
    function clearSelection() {
        selectedCells.forEach(cell => {
            cell.classList.remove('selected');
        });
        selectedCells.clear();
        selectedRows.clear();
        selectedColumns.clear();
        clearRowCheckboxes();
        clearColumnSelection();
        updateEnrichText();
        updateDeleteButtonVisibility();
    }

    /**
     * Select a range of cells between start and end cells
     */
    function selectCellRange(startCell, endCell) {
        const startRow = parseInt(startCell.getAttribute('data-row'));
        const startCol = parseInt(startCell.getAttribute('data-col'));
        const endRow = parseInt(endCell.getAttribute('data-row'));
        const endCol = parseInt(endCell.getAttribute('data-col'));
        
        // Calculate rectangular selection bounds
        const minRow = Math.min(startRow, endRow);
        const maxRow = Math.max(startRow, endRow);
        const minCol = Math.min(startCol, endCol);
        const maxCol = Math.max(startCol, endCol);
        
        clearSelection();
        
        // Select all cells in the rectangular area
        const allCells = document.querySelectorAll('.sheet-row-item:not(.header-cell)');
        
        allCells.forEach(cell => {
            const cellRow = parseInt(cell.getAttribute('data-row'));
            const cellCol = parseInt(cell.getAttribute('data-col'));
            
            if (cellRow >= minRow && cellRow <= maxRow && 
                cellCol >= minCol && cellCol <= maxCol) {
                selectCell(cell);
            }
        });
        
        // Update row checkbox states after range selection
        updateRowCheckboxStates();
    }

    /**
     * Select an entire column
     */
    function selectColumn(colIndex) {
        clearSelection();
        
        const allCells = document.querySelectorAll('.sheet-row-item:not(.header-cell)');
        
        allCells.forEach(cell => {
            const cellCol = parseInt(cell.getAttribute('data-col'));
            if (cellCol === colIndex) {
                selectCell(cell);
            }
        });
        
        // Track the selected column
        selectedColumns.add(colIndex);
        
        // Highlight the header cell
        const headerCell = document.querySelector(`.header-cell[data-col="${colIndex}"]`);
        if (headerCell) {
            headerCell.classList.add('column-selected');
        }
        
        // Update row checkbox states after column selection
        updateRowCheckboxStates();
        updateDeleteButtonVisibility();
    }

    /**
     * Clear column header selection styling
     */
    function clearColumnSelection() {
        document.querySelectorAll('.header-cell').forEach(header => {
            header.classList.remove('column-selected');
        });
    }

    /**
     * Clear all row checkboxes
     */
    function clearRowCheckboxes() {
        // Uncheck "select all" checkbox
        const selectAllCheckbox = document.getElementById('cbxbnall');
        if (selectAllCheckbox) {
            selectAllCheckbox.checked = false;
        }
        
        // Uncheck all individual row checkboxes
        document.querySelectorAll('.row-checkbox').forEach(checkbox => {
            checkbox.checked = false;
        });
    }

    /**
     * Update row checkbox states based on current cell selection
     */
    function updateRowCheckboxStates() {
        const totalColumns = document.querySelectorAll('.header-cell').length;
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        
        // If there are no columns, clear all row selections
        if (totalColumns === 0) {
            clearRowCheckboxes();
            selectedRows.clear();
            return;
        }
        
        // Track which rows have all cells selected
        const completelySelectedRows = new Set();
        
        dataRows.forEach((row, rowIndex) => {
            const rowCells = row.querySelectorAll('.sheet-row-item');
            let selectedCellsInRow = 0;
            
            rowCells.forEach(cell => {
                if (selectedCells.has(cell)) {
                    selectedCellsInRow++;
                }
            });
            
            const rowCheckbox = document.getElementById(`cbxbn${rowIndex + 1}`);
            
            if (selectedCellsInRow === totalColumns && totalColumns > 0) {
                // All cells in this row are selected - check the checkbox
                if (rowCheckbox) {
                    rowCheckbox.checked = true;
                }
                completelySelectedRows.add(rowIndex);
                selectedRows.add(rowIndex);
            } else {
                // Not all cells in this row are selected - uncheck the checkbox
                if (rowCheckbox) {
                    rowCheckbox.checked = false;
                }
                selectedRows.delete(rowIndex);
            }
        });
        
        // Update "select all" checkbox
        const selectAllCheckbox = document.getElementById('cbxbnall');
        if (selectAllCheckbox) {
            selectAllCheckbox.checked = (completelySelectedRows.size === dataRows.length && dataRows.length > 0);
        }
    }

    /**
     * Update the enrich button text based on selection
     */
    function updateEnrichText() {
        const enrichText = document.getElementById('enrich-text');
        if (selectedCells.size > 0) {
            enrichText.textContent = `Enrich ${selectedCells.size} cells`;
        } else {
            enrichText.textContent = 'Enrich';
        }
    }

    /**
     * Update delete button visibility based on current selection
     */
    function updateDeleteButtonVisibility() {
        const deleteRowBtn = document.getElementById('delete-row-btn');
        const deleteColumnBtn = document.getElementById('delete-column-btn');
        
        // Check if we have any columns left
        const totalColumns = document.querySelectorAll('.header-cell').length;
        const totalRows = document.querySelectorAll('.sheet-row:not(.header-row)').length;
        
        // Check if complete rows are selected
        const completeRowsSelected = checkCompleteRowsSelected();
        const completeColumnsSelected = checkCompleteColumnsSelected();
        
        // Show delete row button only if we have columns AND rows AND complete rows selected
        if (totalColumns > 0 && totalRows > 0 && (selectedRows.size > 0 || completeRowsSelected.length > 0)) {
            deleteRowBtn.style.display = 'flex';
        } else {
            deleteRowBtn.style.display = 'none';
        }
        
        // Show delete column button only if we have columns AND complete columns selected
        if (totalColumns > 0 && (selectedColumns.size > 0 || completeColumnsSelected.length > 0)) {
            deleteColumnBtn.style.display = 'flex';
            
            // Reset button to normal state
            const deleteColumnText = deleteColumnBtn.querySelector('.text--micro');
            if (deleteColumnText) {
                deleteColumnText.textContent = 'Delete Column';
            }
            deleteColumnBtn.style.opacity = '1';
            deleteColumnBtn.style.cursor = 'pointer';
        } else {
            deleteColumnBtn.style.display = 'none';
        }
    }
    
    /**
     * Check if any complete rows are selected through cell selection
     */
    function checkCompleteRowsSelected() {
        const totalColumns = document.querySelectorAll('.header-cell').length;
        const rowsWithAllCellsSelected = [];
        
        // If there are no columns, no rows can be considered "complete"
        if (totalColumns === 0) {
            return rowsWithAllCellsSelected;
        }
        
        // Get all data rows
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        
        dataRows.forEach((row, rowIndex) => {
            const rowCells = row.querySelectorAll('.sheet-row-item');
            let selectedCellsInRow = 0;
            
            rowCells.forEach(cell => {
                if (selectedCells.has(cell)) {
                    selectedCellsInRow++;
                }
            });
            
            if (selectedCellsInRow === totalColumns) {
                rowsWithAllCellsSelected.push(rowIndex);
            }
        });
        
        return rowsWithAllCellsSelected;
    }
    
    /**
     * Check if any complete columns are selected through cell selection
     */
    function checkCompleteColumnsSelected() {
        const totalRows = document.querySelectorAll('.sheet-row:not(.header-row)').length;
        const totalColumns = document.querySelectorAll('.header-cell').length;
        const columnsWithAllCellsSelected = [];
        
        for (let colIndex = 0; colIndex < totalColumns; colIndex++) {
            let selectedCellsInColumn = 0;
            
            const columnCells = document.querySelectorAll(`[data-col="${colIndex}"].sheet-row-item:not(.header-cell)`);
            columnCells.forEach(cell => {
                if (selectedCells.has(cell)) {
                    selectedCellsInColumn++;
                }
            });
            
            if (selectedCellsInColumn === totalRows) {
                columnsWithAllCellsSelected.push(colIndex);
            }
        }
        
        return columnsWithAllCellsSelected;
    }

    // ===========================
    // POPUP MANAGEMENT
    // ===========================
    
    /**
     * Open popup for editing an existing column
     */
    function openColumnPopup(headerCell) {
        const colIndex = headerCell.getAttribute('data-col');
        const columnTitle = headerCell.textContent.trim();
        const columnDescription = headerCell.getAttribute('data-description') || 
                                 `Generate data for ${columnTitle} column`;
        
        // Update popup for editing mode
        document.getElementById("popup-title").textContent = "Edit Column";
        document.getElementById("column-action-btn").textContent = "Update Column";
        
        // Pre-fill the popup with current column data
        document.getElementById("column-title").value = columnTitle;
        document.getElementById("column-prompt").value = columnDescription;
        
        // Store the column index for editing
        document.getElementById("popup").setAttribute('data-editing-col', colIndex);
        
        showPopup();
    }

    /**
     * Open popup for adding new column/row
     */
    function openPopup(type) {
        // Reset popup for adding new column
        document.getElementById("popup-title").textContent = "Add Column";
        document.getElementById("column-action-btn").textContent = "Add Column";
        document.getElementById("column-title").value = "";
        document.getElementById("column-prompt").value = "";
        document.getElementById("popup").removeAttribute('data-editing-col');
        
        showPopup();
    }

    /**
     * Show the popup modal
     */
    function showPopup() {
        document.getElementById("popup").style.display = "block";
    }

    /**
     * Close the popup modal
     */
    function closePopup() {
        document.getElementById("popup").style.display = "none";
    }

    // ===========================
    // COLUMN MANAGEMENT
    // ===========================
    
    /**
     * Add a new column or update an existing column
     */
    function addColumn() {
        const columnTitle = document.getElementById("column-title").value;
        const columnPrompt = document.getElementById("column-prompt").value;
        const popup = document.getElementById("popup");
        const editingCol = popup.getAttribute('data-editing-col');

        if (editingCol !== null) {
            updateExistingColumn(editingCol, columnTitle, columnPrompt);
        } else {
            createNewColumn(columnTitle, columnPrompt);
        }
        
        closePopup();
        
        // Re-initialize cells after adding/editing column
        setTimeout(() => {
            initializeSheetCells();
            initializeHeaderCells();
        }, 100);
    }

    /**
     * Update an existing column
     */
    function updateExistingColumn(colIndex, title, prompt) {
        const headerCell = document.querySelector(`.header-cell[data-col="${colIndex}"]`);
        if (headerCell) {
            headerCell.textContent = title;
            headerCell.setAttribute('data-description', prompt);
        }
        console.log("Updated column:", colIndex, title, prompt);
    }

    /**
     * Create a new column
     */
    function createNewColumn(title, prompt) {
        if (!title.trim()) {
            alert("Please enter a column title");
            return;
        }
        
        // Get the current number of columns
        const headerRow = document.querySelector('.header-row');
        const currentColumns = headerRow.querySelectorAll('.header-cell').length;
        
        // Add new header cell
        const newHeaderCell = document.createElement('div');
        newHeaderCell.className = 'sheet-row-item header-cell';
        newHeaderCell.setAttribute('data-col', currentColumns);
        newHeaderCell.textContent = title;
        newHeaderCell.setAttribute('data-description', prompt);
        
        headerRow.appendChild(newHeaderCell);
        
        // Add new cells to all data rows
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        dataRows.forEach(row => {
            const newCell = document.createElement('div');
            newCell.className = 'sheet-row-item';
            newCell.setAttribute('contenteditable', 'false');
            newCell.textContent = ''; // Empty cell for new column
            row.appendChild(newCell);
        });
        
        // If this is the first column being added (was 0 before), show the row headers again
        if (currentColumns === 0) {
            document.querySelectorAll('.sheet-row-head').forEach(element => {
                element.style.display = '';
            });
        }
        
        console.log("Added column:", title, "with prompt:", prompt);
    }

    // ===========================
    // ROW MANAGEMENT
    // ===========================
    
    /**
     * Add a new empty row to the sheet
     */
    function addRow() {
        // Get the current number of columns from the header row
        const headerRow = document.querySelector('.header-row');
        const columnCount = headerRow.querySelectorAll('.header-cell').length;
        
        // Get the current number of data rows
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        const newRowNumber = dataRows.length + 1;
        
        // Create the new row container
        const newRow = document.createElement('div');
        newRow.className = 'sheet-row';
        
        // Create the row header
        const rowHead = document.createElement('div');
        rowHead.className = 'sheet-row-head';
        rowHead.setAttribute('data-row', newRowNumber);
        
        // Add row number
        const rowNumber = document.createElement('span');
        rowNumber.className = 'row-number';
        rowNumber.textContent = newRowNumber;
        rowHead.appendChild(rowNumber);
        
        // Add checkbox for row selection
        const checkboxInput = document.createElement('input');
        checkboxInput.setAttribute('onchange', `select_row(this.id, '${newRowNumber}')`);
        checkboxInput.type = 'checkbox';
        checkboxInput.className = 'cbx row-checkbox';
        checkboxInput.id = `cbxbn${newRowNumber}`;
        checkboxInput.style.display = 'none';
        rowHead.appendChild(checkboxInput);
        
        const checkboxLabel = document.createElement('label');
        checkboxLabel.setAttribute('for', `cbxbn${newRowNumber}`);
        checkboxLabel.className = 'check row-check';
        checkboxLabel.innerHTML = `<svg width="16px" height="16px" viewBox="0 0 18 18">
            <path d="M1,9 L1,3.5 C1,2 2,1 3.5,1 L14.5,1 C16,1 17,2 17,3.5 L17,14.5 C17,16 16,17 14.5,17 L3.5,17 C2,17 1,16 1,14.5 L1,9 Z"></path>
            <polyline points="1 9 7 14 15 4"></polyline>
        </svg>`;
        rowHead.appendChild(checkboxLabel);
        
        newRow.appendChild(rowHead);
        
        // Add empty cells for each column
        for (let i = 0; i < columnCount; i++) {
            const newCell = document.createElement('div');
            newCell.className = 'sheet-row-item';
            newCell.setAttribute('contenteditable', 'false');
            newCell.textContent = ''; // Empty cell
            newRow.appendChild(newCell);
        }
        
        // Append the new row to the sheet grid container
        const sheetContainer = document.querySelector('.sheet-grid-container');
        sheetContainer.appendChild(newRow);
        
        // Re-initialize cells to ensure proper event handling
        setTimeout(() => {
            initializeSheetCells();
        }, 50);
        
        console.log("Added new row:", newRowNumber);
    }

    // ===========================
    // ROW SELECTION FUNCTIONS
    // ===========================
    
    /**
     * Handle row checkbox selection
     */
    function select_row(checkboxId, rowId) {
        const checkbox = document.getElementById(checkboxId);
        
        if (rowId === 'all') {
            // Handle select all checkbox
            const allRowCheckboxes = document.querySelectorAll('.row-checkbox');
            allRowCheckboxes.forEach(cb => {
                cb.checked = checkbox.checked;
            });
            
            if (checkbox.checked) {
                // Select all cells in data rows
                const allDataCells = document.querySelectorAll('.sheet-row-item:not(.header-cell)');
                allDataCells.forEach(cell => selectCell(cell));
                
                // Track all rows as selected
                const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
                dataRows.forEach((row, index) => {
                    selectedRows.add(index);
                });
            } else {
                clearSelection();
            }
        } else {
            // Handle individual row selection
            const rowIndex = parseInt(rowId) - 1; // Convert to 0-based index
            const rowCells = document.querySelectorAll(`[data-row="${rowIndex}"]`);
            
            if (checkbox.checked) {
                rowCells.forEach(cell => {
                    if (cell.classList.contains('sheet-row-item')) {
                        selectCell(cell);
                    }
                });
                selectedRows.add(rowIndex);
            } else {
                rowCells.forEach(cell => {
                    if (cell.classList.contains('sheet-row-item')) {
                        deselectCell(cell);
                    }
                });
                selectedRows.delete(rowIndex);
            }
        }
        
        updateDeleteButtonVisibility();
        console.log(`Row ${rowId} selection: ${checkbox.checked}`);
    }

    // ===========================
    // DELETE FUNCTIONS
    // ===========================
    
    /**
     * Delete selected rows
     */
    function deleteSelectedRows() {
        const checkboxSelectedRows = Array.from(selectedRows);
        const cellSelectedRows = checkCompleteRowsSelected();
        const allRowsToDelete = [...new Set([...checkboxSelectedRows, ...cellSelectedRows])];
        
        if (allRowsToDelete.length === 0) {
            alert('No complete rows selected for deletion');
            return;
        }
        
        const rowsToDelete = allRowsToDelete.sort((a, b) => b - a); // Sort in descending order
        const confirmMessage = `Are you sure you want to delete ${rowsToDelete.length} row(s)?`;
        
        if (!confirm(confirmMessage)) {
            return;
        }
        
        // Delete rows from bottom to top to maintain correct indices
        rowsToDelete.forEach(rowIndex => {
            const rowsArray = Array.from(document.querySelectorAll('.sheet-row:not(.header-row)'));
            if (rowIndex < rowsArray.length) {
                rowsArray[rowIndex].remove();
            }
        });
        
        // Clear selection and update row indices
        clearSelection();
        updateRowIndices();
        
        // Immediately update button visibility after clearing selection
        updateDeleteButtonVisibility();
        
        // Force update button visibility after deletion
        setTimeout(() => {
            updateDeleteButtonVisibility();
        }, 50);
        
        console.log(`Deleted ${rowsToDelete.length} rows`);
    }
    
    /**
     * Delete selected columns
     */
    function deleteSelectedColumns() {
        const checkboxSelectedColumns = Array.from(selectedColumns);
        const cellSelectedColumns = checkCompleteColumnsSelected();
        const allColumnsToDelete = [...new Set([...checkboxSelectedColumns, ...cellSelectedColumns])];
        
        if (allColumnsToDelete.length === 0) {
            alert('No complete columns selected for deletion');
            return;
        }
        
        const columnsToDelete = allColumnsToDelete.sort((a, b) => b - a); // Sort in descending order
        const confirmMessage = `Are you sure you want to delete ${columnsToDelete.length} column(s)?`;
        
        if (!confirm(confirmMessage)) {
            return;
        }
        
        // Delete columns from right to left to maintain correct indices
        columnsToDelete.forEach(colIndex => {
            // Delete header cell
            const headerCell = document.querySelector(`.header-cell[data-col="${colIndex}"]`);
            if (headerCell) {
                headerCell.remove();
            }
            
            // Delete all cells in this column from all rows (but NOT the row headers)
            const allRows = document.querySelectorAll('.sheet-row:not(.header-row)');
            allRows.forEach(row => {
                // Get only data cells (sheet-row-item elements)
                const dataCells = row.querySelectorAll('.sheet-row-item');
                if (dataCells[colIndex]) {
                    dataCells[colIndex].remove();
                }
            });
        });
        
        // Clear selection and update column indices
        clearSelection();
        updateColumnIndices();
        
        // Immediately update button visibility after clearing selection
        updateDeleteButtonVisibility();
        
        // Check if all columns were deleted
        const remainingColumns = document.querySelectorAll('.header-cell').length;
        if (remainingColumns === 0) {
            // Hide all row headers when there are no columns
            document.querySelectorAll('.sheet-row-head').forEach(element => {
                element.style.display = 'none';
            });
            
            // Optionally show a message or automatically create a default column
            console.log('All columns deleted - sheet now has only data rows without headers');
        } else {
            // Ensure row headers are visible if we still have columns
            document.querySelectorAll('.sheet-row-head').forEach(element => {
                element.style.display = '';
            });
        }
        
        // Re-initialize cells after column deletion
        setTimeout(() => {
            initializeSheetCells();
            initializeHeaderCells();
            // Force update button visibility after deletion
            updateDeleteButtonVisibility();
        }, 100);
        
        console.log(`Deleted ${columnsToDelete.length} columns`);
    }
    
    /**
     * Update column indices after column deletion
     */
    function updateColumnIndices() {
        // Update header cells
        const headerCells = document.querySelectorAll('.header-cell');
        headerCells.forEach((cell, index) => {
            cell.setAttribute('data-col', index);
        });
        
        // Update all data cells
        const dataRows = document.querySelectorAll('.sheet-row:not(.header-row)');
        dataRows.forEach((row, rowIndex) => {
            const cells = row.querySelectorAll('.sheet-row-item');
            cells.forEach((cell, colIndex) => {
                cell.setAttribute('data-col', colIndex);
                cell.setAttribute('data-cell-id', rowIndex * cells.length + colIndex);
            });
        });
    }


    function enrichSelectedCells() {
        if (selectedCells.size === 0) {
            alert('No cells selected for enrichment');
            return;
        }
        
        // Cache DOM queries for better performance
        const headerCells = new Map();
        const rowDataCache = new Map();
        
        // Pre-cache all header cells to avoid repeated DOM queries
        document.querySelectorAll('.header-cell').forEach(header => {
            const col = header.getAttribute('data-col');
            headerCells.set(col, {
                name: header.textContent.trim(),
                description: header.getAttribute('data-description') || `No description found for column ${col}`
            });
        });
        
        // Group selected cells by column and row for efficient processing
        const columnData = new Map();
        const rowGroups = new Map();
        
        selectedCells.forEach(cell => {
            const row = cell.getAttribute('data-row');
            const col = cell.getAttribute('data-col');
            const value = cell.textContent.trim();
            
            // Group by column
            if (!columnData.has(col)) {
                const headerInfo = headerCells.get(col) || {
                    name: `Column ${col}`,
                    description: `No description found for column ${col}`
                };
                columnData.set(col, {
                    ...headerInfo,
                    values: []
                });
            }
            columnData.get(col).values.push(value);
            
            // Group by row
            if (!rowGroups.has(row)) {
                rowGroups.set(row, []);
            }
            rowGroups.get(row).push({ col, value });
        });
        
        // Pre-cache full row data for unique rows
        rowGroups.forEach((cells, row) => {
            if (!rowDataCache.has(row)) {
                const rowCells = document.querySelectorAll(`.sheet-row-item[data-row="${row}"]`);
                const fullRowData = {};
                
                rowCells.forEach(cell => {
                    const colIndex = cell.getAttribute('data-col');
                    const cellValue = cell.textContent.trim();
                    
                    // Only include non-empty values in context
                    if (cellValue) {
                        const headerInfo = headerCells.get(colIndex);
                        const colName = headerInfo ? headerInfo.name : `Column ${colIndex}`;
                        fullRowData[colName] = cellValue;
                    }
                });
                
                rowDataCache.set(row, fullRowData);
            }
        });
        
        // Build formatted data efficiently
        const formattedData = [];
        selectedCells.forEach(cell => {
            const row = cell.getAttribute('data-row');
            const col = cell.getAttribute('data-col');
            const value = cell.textContent.trim();
            const columnInfo = columnData.get(col);
            
            formattedData.push({
                context: rowDataCache.get(row),
                position: {
                    Row: row,
                    Column: col
                },
                title: columnInfo.name,
                description: columnInfo.description,
                value: value
            });
        });

        console.log('Formatted data for enrichment:', formattedData);

        startEnriching(formattedData);
    }


    function startEnriching(data) {
        console.log('Starting enrichment process with data:', data);
        console.log(data.length + ' cells to enrich');

        if (data.length === 0) {
            return;
        }

        // First, set all selected cells to "Queued" status immediately
        data.forEach(cellData => {
            const cell = findCell(cellData.position.Row, cellData.position.Column);
            if (cell) {
                setCellStatus(cell, 'queued');
            }
        });

        // Clear the selection after setting queued status
        clearSelection();

        // Start processing cells sequentially
        processEnrichmentQueue(data, 0);
    }

    /**
     * Process enrichment queue sequentially
     */
    async function processEnrichmentQueue(data, currentIndex) {
        if (currentIndex >= data.length) {
            console.log('All cells enriched successfully');
            return;
        }

        const cellData = data[currentIndex];
        const cell = findCell(cellData.position.Row, cellData.position.Column);
        
        if (!cell) {
            console.error('Cell not found:', cellData.position);
            // Continue with next cell
            processEnrichmentQueue(data, currentIndex + 1);
            return;
        }

        try {
            // Set cell to "Generating" status (no need to set queued again)
            setCellStatus(cell, 'generating');
            
            // Simulate API call with 2 second delay
            await sleep(2000);
            
            // Generate mock enriched value
            {% comment %} const enrichedValue = generateMockEnrichedValue(cellData); {% endcomment %}
            
            var payload = {
                action: 'enrich',
                data: JSON.stringify(cellData),
                csrfmiddlewaretoken: '{{ csrf_token }}'
            }

            $.post('/api/enrich/do', payload, function(response) {
                console.log('Enrichment response:', response);
                if (response.status === 'success') {
                    // Update cell content with enriched value
                    setCellContent(cell, response.result);
                } else {
                    // Handle error case
                    setCellStatus(cell, 'error');
                }
            });
            
            {% comment %} console.log(`Enriched cell at row ${cellData.position.Row}, col ${cellData.position.Column}: "${enrichedValue}"`); {% endcomment %}
            
        } catch (error) {
            console.error('Error enriching cell:', error);
            // Reset cell to original state on error
            setCellStatus(cell, 'error');
            await sleep(1000);
            setCellContent(cell, cellData.value); // Restore original value
        }
        
        // Process next cell in queue
        processEnrichmentQueue(data, currentIndex + 1);
    }

    /**
     * Set visual status indicator for a cell
     */
    function setCellStatus(cell, status) {
        // Remove any existing status indicators
        const existingIndicator = cell.querySelector('.enrichment-status');
        if (existingIndicator) {
            existingIndicator.remove();
        }

        // Create status indicator element
        const statusIndicator = document.createElement('div');
        statusIndicator.className = 'enrichment-status';
        
        let statusText = '';
        let statusColor = '';
        
        switch (status) {
            case 'queued':
                statusText = 'Queued';
                statusColor = '#f59e0b'; // Yellow
                break;
            case 'generating':
                statusText = 'Generating...';
                statusColor = '#10b981'; // Green
                break;
            case 'error':
                statusText = 'Error';
                statusColor = '#ef4444'; // Red
                break;
            default:
                return; // No status to show
        }

        statusIndicator.innerHTML = `
            <div style="display: flex; align-items: center; gap: 5px; font-size: 12px; color: white;">
                <div style="width: 8px; height: 8px; border-radius: 50%; background-color: ${statusColor};"></div>
                <span>${statusText}</span>
            </div>
        `;

        // Clear cell content and add status indicator
        cell.innerHTML = '';
        cell.appendChild(statusIndicator);
    }

    /**
     * Set cell content and remove status indicator
     */
    function setCellContent(cell, content) {
        // Remove any existing status indicators
        const existingIndicator = cell.querySelector('.enrichment-status');
        if (existingIndicator) {
            existingIndicator.remove();
        }

        // Set the new content
        cell.textContent = content;
    }

    /**
     * Generate mock enriched value for demonstration
     */
    function generateMockEnrichedValue(cellData) {
        const { title, value, context } = cellData;
        
        // Generate different types of mock data based on column name
        const columnLower = title.toLowerCase();
        
        if (columnLower.includes('category')) {
            const categories = ['Software', 'Productivity', 'Communication', 'Design', 'Project Management'];
            return categories[Math.floor(Math.random() * categories.length)];
        } else if (columnLower.includes('price')) {
            const prices = ['$9.99/month', '$19.99/month', '$29.99/month', '$49.99/month', '$99.99/month'];
            return prices[Math.floor(Math.random() * prices.length)];
        } else if (columnLower.includes('description')) {
            return `AI-generated description for ${value}`;
        } else if (columnLower.includes('email') || columnLower.includes('contact')) {
            return `contact@${value.toLowerCase().replace(/\s+/g, '')}.com`;
        } else if (columnLower.includes('website') || columnLower.includes('url')) {
            return `https://www.${value.toLowerCase().replace(/\s+/g, '')}.com`;
        } else {
            // Generic enrichment
            return `Enriched: ${value}`;
        }
    }

    /**
     * Sleep utility function for delays
     */
    function sleep(milliseconds) {
        return new Promise(resolve => setTimeout(resolve, milliseconds));
    }



</script>
